name: Auto Tag by Commit Date

on:
  push:
    branches:
      - main
    paths:
      - 'Nilesat_EPG.sources.xml' # يشتغل فقط عند تعديل ملف السورس

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    # الحل النهائي لمشكلة Permission Denied 403
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # لجلب كل التاجات القديمة ومنع التكرار

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get commit date and format tag
        id: get-tag
        run: |
          # استخراج التاريخ بصيغة YYYYMMDD
          COMMIT_DATE=$(date +'%Y%m%d')
          echo "tag=$COMMIT_DATE" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: tag-check
        run: |
          TAG_NAME=${{ steps.get-tag.outputs.tag }}
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG_NAME already exists. Skipping..."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.tag-check.outputs.exists == 'false'
        run: |
          TAG_NAME=${{ steps.get-tag.outputs.tag }}
          git tag "$TAG_NAME"
          git push origin "$TAG_NAME"
